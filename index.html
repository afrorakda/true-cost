<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>True Cost</title>
    <link rel="icon" href="image_16.png">
    <link rel="apple-touch-icon" href="image_16.png">
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #fff; margin: 0; display: flex; justify-content: center; color: #111; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
        .container { width: 100%; max-width: 400px; padding: 25px 20px; box-sizing: border-box; text-align: center; display: flex; flex-direction: column; height: 100vh; justify-content: space-between; }
        
        h1 { font-size: 2rem; font-weight: 800; margin: 0; letter-spacing: -1px; }
        .subtitle { font-size: 0.9rem; color: #666; margin: 5px 0 20px; font-weight: 500; }
        
        .input-group { display: flex; gap: 10px; margin-bottom: 15px; }
        input { 
            width: 100%; padding: 18px; font-size: 1.1rem; border: 1px solid #eee; 
            border-radius: 15px; box-sizing: border-box; outline: none; 
            text-align: center; background: #fafafa; -webkit-appearance: none;
        }

        .deal-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        .deal-btn, .deal-input { 
            padding: 15px; background: #fff; border: 1px solid #eee; border-radius: 15px; 
            box-sizing: border-box; font-size: 0.9rem; font-weight: 700; cursor: pointer; color: #444;
            outline: none; -webkit-appearance: none; text-align: center;
        }
        .deal-btn.active { background: #111; color: #fff; border-color: #111; }
        .deal-input:focus { border-color: #111; background: #fff; }

        .result-box { 
            background: #fafafa; border-radius: 15px; padding: 15px; margin-bottom: 15px;
            display: flex; flex-direction: column; justify-content: center;
        }
        .res-label { font-size: 0.7rem; color: #999; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
        .res-value { font-size: 2.2rem; font-weight: 800; color: #111; line-height: 1; }
        .res-save { font-size: 0.85rem; color: #e63946; font-weight: 700; margin-top: 5px; height: 1rem; }

        .clear-btn { 
            width: 100%; padding: 15px; background-color: #fff; color: #bbb; 
            border: 1px solid #f0f0f0; border-radius: 15px; font-size: 0.85rem; font-weight: 600; 
            cursor: pointer; margin-bottom: 20px;
        }

        .btn-group { display: flex; flex-direction: column; align-items: center; gap: 10px; border-top: 1px solid #f0f0f0; padding-top: 20px; }
        .kofi-btn { background: #111; color: #fff; padding: 12px 24px; border-radius: 15px; text-decoration: none; font-weight: bold; font-size: 13px; }
        .install-btn { background: #f0f0f0; color: #666; padding: 10px 20px; border-radius: 15px; border: none; cursor: pointer; font-size: 12px; font-weight: 700; }
        footer { font-size: 10px; color: #aaa; line-height: 1.4; padding-bottom: 10px; }

        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #fff; padding: 30px; border-radius: 20px; width: 85%; max-width: 320px; text-align: center; position: relative; margin: auto; }
        .close-x { position: absolute; top: 12px; right: 18px; font-size: 22px; cursor: pointer; color: #ccc; }
    </style>
</head>
<body>

<div class="container">
    <div>
        <h1>True Cost</h1>
        <p class="subtitle">Unmask the real price per unit.</p>
        
        <div class="input-group">
            <input type="number" id="price" placeholder="Price" oninput="calc()" inputmode="decimal">
            <input type="number" id="qty" placeholder="Qty" oninput="calc()" inputmode="numeric">
        </div>

        <div class="deal-grid">
            <button class="deal-btn active" id="btn-normal" onclick="setDeal('normal', this)">Normal</button>
            <input type="number" id="discountInput" class="deal-input" placeholder="20% OFF" oninput="handleDiscountInput(this)" onclick="setDeal('discount', this)" inputmode="numeric">
            <button class="deal-btn" onclick="setDeal('BOGO', this)">Buy 1 Get 1</button>
            <button class="deal-btn" onclick="setDeal('B2G1', this)">Buy 2 Get 1</button>
        </div>

        <div class="result-box">
            <div class="res-label">True Price Per Unit</div>
            <div class="res-value" id="finalPrice">0.00</div>
            <div class="res-save" id="saveAmount"></div>
        </div>

        <button class="clear-btn" onclick="resetAll()">Clear All</button>
    </div>

    <div class="btn-group">
        <a href="https://ko-fi.com/afrorakda" target="_blank" class="kofi-btn">☕ Support me on Ko-fi</a>
        <button class="install-btn" onclick="showModal()">Add to Home Screen</button>
        <footer>
            No login / No tracking / No ads / Browser only<br>
            Privacy Policy<br>
            <strong>True Cost © 2026</strong>
        </footer>
    </div>
</div>

<div id="modal">
    <div class="modal-content">
        <span class="close-x" onclick="closeModal()">&times;</span>
        <strong>📱 Install</strong><br><br>
        <p><strong>🍏 iPhone (Safari):</strong><br>Tap <strong>Share</strong>, then <strong>Add to Home Screen</strong>.</p>
        <p><strong>🤖 Android (Chrome):</strong><br>Tap <strong>Menu (⋮)</strong>, then <strong>Add to Home screen</strong>.</p>
    </div>
</div>

<script>
    let mode = 'normal';

    function setDeal(newMode, element) {
        mode = newMode;
        document.querySelectorAll('.deal-btn, .deal-input').forEach(b => b.classList.remove('active'));
        element.classList.add('active');
        calc();
    }

    function handleDiscountInput(input) {
        setDeal('discount', input);
    }

    function calc() {
        let p = parseFloat(document.getElementById('price').value) || 0;
        let q = parseFloat(document.getElementById('qty').value) || 0;
        let res = 0;
        let showSave = false;

        if (p > 0 && q > 0) {
            if (mode === 'normal') {
                res = p / q;
            } else if (mode === 'discount') {
                let d = parseFloat(document.getElementById('discountInput').value);
                if (isNaN(d)) d = 20; // Default 20%
                res = (p * (1 - d/100)) / q;
                showSave = true;
            } else if (mode === 'BOGO') {
                res = p / (q * 2);
                showSave = true;
            } else if (mode === 'B2G1') {
                res = (p * 2) / (q * 3);
                showSave = true;
            }
        }

        document.getElementById('finalPrice').innerText = res.toFixed(2);
        document.getElementById('saveAmount').innerText = (showSave && p > 0 && q > 0) ? "You save something!" : "";
    }

    function resetAll() {
        document.getElementById('price').value = "";
        document.getElementById('qty').value = "";
        document.getElementById('discountInput').value = "";
        setDeal('normal', document.getElementById('btn-normal'));
    }

    function showModal() { document.getElementById('modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
</script>

</body>
</html>
